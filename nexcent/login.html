<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        body{
            margin-left: 450px;
            margin-top: 150px;
        }
        h1{
            color: green;
        }
        input{
            width: 400px;
            height: 40px;
            font-size: 15px;
            margin-left: -30px;
            border-top: none;
            border-left: none;
            border-right: none;
            border-color: green;
        }
        #submit{
            background-color: green;
            border: none;
            margin-left: 0px;
            color: white;
        }
        span{
        position: relative;
        left: 0px;
        top: 10px;
        color: green;
}

    </style>
</head>
<body>
    <h1>Log in</h1>
    <form action="" method="get">
        <label for="">Username:</label><br>
        <span class="material-symbols-outlined">
            person
            </span>
        <input type="text" name="" id=""  required><br><br>
        <label for="">Password:</label><br>
        <span class="material-symbols-outlined">
            lock
            </span>
        <input type="text" name="" id="" required  minlength="6"><br><br>
        <input type="submit" value="Log In" id="submit">
    </form>
    <p style="margin-left: 120px;">New here? <a href="./register.html" style="color: green; text-decoration: none;">Register now</a></p>
</body>
<script src="./login.js"></script>

</html>
